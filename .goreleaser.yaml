version: 2

project_name: onessh

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: onessh
    main: ./cmd/onessh
    binary: onessh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: default
    ids:
      - onessh
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: onessh
    ids:
      - default
    homepage: "https://github.com/tiangong-dev/onessh"
    description: "Encrypted SSH host manager with one master password"
    license: "MIT"
    directory: Formula
    repository:
      owner: tiangong-dev
      name: onessh
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    commit_msg_template: "chore(brew): update onessh formula to {{ .Tag }}"
    install: |
      bin.install "onessh"
    test: |
      system "#{bin}/onessh", "--help"
